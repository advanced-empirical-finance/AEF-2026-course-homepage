project:
  type: website
  output-dir: docs
  # Pulls the latest lecture decks from ../course-repository and regenerates
  # slides.qmd before every render. Requires course-repository checked out
  # alongside this repo.
  pre-render:
    - tools/build-slides-page.R
  resources:
    - slides/
    - CNAME      # keep the custom domain on every render of docs/


website:
  navbar:
    collapse: true
    search: true
    right:
      - text: home
        file: index.qmd
      - text: lecture plan
        file: slides-index.qmd
      - text: exercises
        file: exercises/index.qmd
      - text: slides
        file: slides.qmd
      - text: more ressources
        file: additional-material/index.qmd
      - icon: github
        url:  https://github.com/advanced-empirical-finance/AEF-2026-course-homepage
  sidebar:
     - title: exercises
       style: docked
       contents:
         - exercises/index.qmd
         - section: Introduction
           contents:
             - exercises/technical-prerequisites.qmd
             - exercises/introduction.qmd
         - section: Asset Pricing
           contents:
             - exercises/financial_data.qmd
             - exercises/beta_estimation.qmd
             - exercises/portfolio_sorts.qmd
         - section: Machine Learning
           contents:
             - exercises/gu_kelly_xiu.qmd
             - exercises/machine_learning.qmd
             - exercises/machine_learning_nonlinear.qmd
         - section: Covariance Estimation and Portfolio Choice
           contents:
             - exercises/covariance_estimation.qmd
             - exercises/portfolio_choice.qmd
         - section: High-frequency data
           contents:
             - exercises/high-frequency-econometrics.qmd
     - title: more ressources
       style: docked
       contents:
         - additional-material/index.qmd
         - section: Positron and AI
           contents:
             - additional-material/positron-ai-assistant.qmd
             - additional-material/assignment-quality-criteria.qmd
         - section: Workflows
           contents:
             - additional-material/quarto-documentation.qmd
             - additional-material/github-collaboration.qmd
             - additional-material/ml-data-preparation-for-python.qmd
             - additional-material/storing-and-sharing-workflows.qmd

format:
  html:
    theme:
      - cosmo
    css: styles.css
    toc: true
    code-block-border-left: true
    grid:
      sidebar-width: 250px
      body-width: 1100px      # wider content (Quarto default is 900px)
      margin-width: 200px
      gutter-width: 1.5rem


eval:
  false